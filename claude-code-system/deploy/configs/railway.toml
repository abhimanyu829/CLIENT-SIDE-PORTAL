[build]
  builder = "NIXPACKS"

[deploy]
  startCommand = "npm run start"
  healthcheckPath = "/api/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

# Services to create in Railway dashboard:
# 1. Web service    → npm start       (this config)
# 2. Worker service → npm run worker  (separate service, same repo)
# 3. PostgreSQL     → Railway managed Postgres (enable pgvector extension)
# 4. Redis          → Railway managed Redis OR Upstash free tier
