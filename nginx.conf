user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  # ── Rate limiting zones ───────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=api_checkout:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/15m;
  limit_req_zone $binary_remote_addr zone=api_coupon:10m rate=20r/h;

  # ── Upstream ──────────────────────────────────────────────────────────────────
  upstream nextjs {
    server web:3000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS main server ─────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;   # ← replace with your domain

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    client_max_body_size 10M;

    # ── Auth routes — strict rate limit ─────────────────────────────────────────
    location ~ ^/api/auth/ {
      limit_req zone=api_auth burst=3 nodelay;
      limit_req_status 429;
      proxy_pass http://nextjs;
      include /etc/nginx/proxy_params.conf;
    }

    # ── Checkout — strict rate limit ─────────────────────────────────────────────
    location ~ ^/api/payments/checkout {
      limit_req zone=api_checkout burst=5 nodelay;
      limit_req_status 429;
      proxy_pass http://nextjs;
      include /etc/nginx/proxy_params.conf;
    }

    # ── Coupon validation ─────────────────────────────────────────────────────────
    location ~ ^/api/coupons/validate {
      limit_req zone=api_coupon burst=10 nodelay;
      limit_req_status 429;
      proxy_pass http://nextjs;
      include /etc/nginx/proxy_params.conf;
    }

    # ── Stripe webhook — no rate limit (Stripe IPs only) ─────────────────────────
    location /api/payments/stripe/webhook {
      proxy_pass http://nextjs;
      include /etc/nginx/proxy_params.conf;
    }

    # ── Razorpay webhook ──────────────────────────────────────────────────────────
    location /api/payments/razorpay/webhook {
      proxy_pass http://nextjs;
      include /etc/nginx/proxy_params.conf;
    }

    # ── General API ───────────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_general burst=20 nodelay;
      limit_req_status 429;
      proxy_pass http://nextjs;
      include /etc/nginx/proxy_params.conf;
    }

    # ── Next.js static assets — cached aggressively ───────────────────────────────
    location /_next/static/ {
      proxy_pass http://nextjs;
      proxy_cache_valid 200 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      include /etc/nginx/proxy_params.conf;
    }

    # ── Everything else → Next.js ─────────────────────────────────────────────────
    location / {
      proxy_pass http://nextjs;
      include /etc/nginx/proxy_params.conf;
    }
  }
}
